version: '3.8'

services:
  # vLLM Replica 1 - Standard configuration
  vllm-replica-1:
    image: vllm/vllm-openai:latest
    container_name: vllm-replica-1
    ports:
      - "8001:8000"
    environment:
      - HF_TOKEN=${HF_TOKEN}
    command:
      - --model
      - Qwen/Qwen2.5-0.5B-Instruct
      - --port
      - "8000"
      - --gpu-memory-utilization
      - "0.25"
      - --max-model-len
      - "512"
      - --dtype
      - auto
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  # vLLM Replica 2 - High capacity configuration
  vllm-replica-2:
    image: vllm/vllm-openai:latest
    container_name: vllm-replica-2
    ports:
      - "8002:8000"
    environment:
      - HF_TOKEN=${HF_TOKEN}
    command:
      - --model
      - Qwen/Qwen2.5-0.5B-Instruct
      - --port
      - "8000"
      - --gpu-memory-utilization
      - "0.3"
      - --max-model-len
      - "1024"
      - --dtype
      - auto
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  # vLLM Replica 3 - Cache-optimized configuration
  vllm-replica-3:
    image: vllm/vllm-openai:latest
    container_name: vllm-replica-3
    ports:
      - "8003:8000"
    environment:
      - HF_TOKEN=${HF_TOKEN}
    command:
      - --model
      - Qwen/Qwen2.5-0.5B-Instruct
      - --port
      - "8000"
      - --gpu-memory-utilization
      - "0.25"
      - --max-model-len
      - "512"
      - --enable-prefix-caching
      - --dtype
      - auto
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

networks:
  default:
    name: traffic-control-network
