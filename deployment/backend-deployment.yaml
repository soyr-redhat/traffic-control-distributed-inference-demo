apiVersion: apps/v1
kind: Deployment
metadata:
  name: traffic-control-backend
  labels:
    app: traffic-control
    component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traffic-control
      component: backend
  template:
    metadata:
      labels:
        app: traffic-control
        component: backend
    spec:
      containers:
      - name: backend
        image: image-registry.openshift-image-registry.svc:5000/traffic-control/traffic-backend:latest
        ports:
        - containerPort: 8000
          name: http
        envFrom:
        - configMapRef:
            name: traffic-control-config
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
