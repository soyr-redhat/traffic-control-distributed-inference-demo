apiVersion: apps/v1
kind: Deployment
metadata:
  name: traffic-control-frontend
  labels:
    app: traffic-control
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traffic-control
      component: frontend
  template:
    metadata:
      labels:
        app: traffic-control
        component: frontend
    spec:
      containers:
      - name: frontend
        image: image-registry.openshift-image-registry.svc:5000/traffic-control/traffic-frontend:latest
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
