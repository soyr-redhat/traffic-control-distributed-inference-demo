---
# vLLM Replica 1 - Standard configuration
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-replica-1
  labels:
    app: vllm-replica-1
    component: inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-replica-1
  template:
    metadata:
      labels:
        app: vllm-replica-1
        component: inference
    spec:
      containers:
      - name: vllm
        image: vllm/vllm-openai:latest
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: HF_HOME
          value: /tmp/huggingface
        command:
        - python3
        - -m
        - vllm.entrypoints.openai.api_server
        - --model
        - Qwen/Qwen2.5-0.5B-Instruct
        - --port
        - "8000"
        - --gpu-memory-utilization
        - "0.25"
        - --max-model-len
        - "512"
        - --dtype
        - auto
        resources:
          requests:
            nvidia.com/gpu: "1"
          limits:
            nvidia.com/gpu: "1"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-replica-1
  labels:
    app: vllm-replica-1
spec:
  selector:
    app: vllm-replica-1
  ports:
  - port: 8000
    targetPort: 8000
    name: http
